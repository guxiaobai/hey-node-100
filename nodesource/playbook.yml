---
- hosts: metal
  become: yes
  gather_facts: false
  vars:
    NODE_MAJOR: 22
    key: /etc/apt/keyrings/nodesource.gpg

  tasks:
  - name: Add NodeSource Key
    apt_key:
      url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
      keyring: "{{ key }}"
      state: present


  - name: Add NodeSource Repo
    apt_repository:
      repo: "{{ item }}"
      state: present
      filename: nodesource
    with_items:
      - deb [signed-by={{ key }}] https://deb.nodesource.com/node_{{ NODE_MAJOR }}.x nodistro main

  - name: Install Node.js
    apt:
      name: nodejs
      state: present